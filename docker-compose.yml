services:
  db:
    image: postgres:16-alpine
    container_name: nextmarket-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nextmarket
      POSTGRES_PASSWORD: nextmarket_dev_password
      POSTGRES_DB: nextmarket
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextmarket -d nextmarket"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
